# =============================================================================
# GOLDEN-SET v1 — hand-leveled cell-level expectations (MAIN SET, clean run)
# =============================================================================
# Author: Marvin (bid-leveling domain authority). Date: 2026-07-14.
# Ground truth for: engines/matrix engine v0.3.2 semantics.
# Companion inputs: interim/*.json + project.yaml + overlay/known_firms.local.yaml
#
# EVERY value in this file was HAND-COMPUTED from the six interim BidDocuments
# under the rules in FALKE/03_Matrix/FALKE-LEVELING-RULES-SPEC.md as implemented
# in v0.3.2. Arithmetic is shown in comments so a reviewer (Christine, Floyd)
# can re-derive any number without running the engine.
#
# VERSIONING RULE: this file versions WITH the engine. Any engine change that
# legitimately alters a value here must update this file IN THE SAME CHANGE,
# with the delta explained. Entries tagged `defect:` encode CURRENT engine
# behavior that is a registered defect (see known_deviations at bottom) — when
# the defect is fixed, flip the entry in the fixing PR.
#
# TOLERANCES for the harness:
#   dollars:   |written - expected| <= 0.01
#   fractions: |written - expected| <= 0.0001  (variance/spread are raw
#              fractions; Excel number format renders them as %)
#   strings:   comment assertions are substring matches (comment_contains);
#              token assertions are EXACT cell-text matches.
# =============================================================================

meta:
  gold_set: gold-project-v1
  version: 1
  engine_semantics: v0.3.2
  author: Marvin
  date: "2026-07-14"
  public_safe: true          # zero real client tokens — synthetic by design

run:
  # Harness contract (see README.md §Harness):
  # 1. Install overlay/known_firms.local.yaml as engines/matrix/config/
  #    known_firms.local.yaml (backup/restore any pre-existing overlay; the
  #    gold run must execute with EXACTLY this overlay).
  # 2. PYTHONPATH=<engine root> python3 -m src.pipeline \
  #      --interim-dir eval/golden/gold-project-v1/interim \
  #      --project-config eval/golden/gold-project-v1/project.yaml \
  #      --sf-basis 100000 --out <tmp>/gold-v1.xlsx
  # 3. Assert exit code, then every block below. Report ALL mismatches (do not
  #    fail fast); exit nonzero on any mismatch.
  sf_basis: 100000
  expected_exit_code: 0      # clean run: Stage 6b must tie out, no quarantine
  expected_sheets: [Bid_Form, Leveled_Normalized, AUDIT]

locator_contract:
  # How the harness finds cells (same label-anchored idiom as reconcile.py —
  # never absolute coordinates):
  # - Bidder columns: contractor names on row 5. Leveled_Normalized groups
  #   start at column D, stride 5 (COST | COST SUBTOTALS | $/SF | $/SXFX | VAR%).
  #   Bid_Form groups start at column D, stride 3.
  # - Division subtotal rows: col-B label "{DIVISION NAME UPPER} SUBTOTAL".
  # - Leveled footer rows: col-B display labels (LEVELED_FOOTER_LABELS);
  #   Bid_Form footer rows: col-A machine keys (e.g. GRAND_TOTAL).
  # - Benchmark block: 4 columns right of the last bidder group, in order
  #   BENCHMARK (median) | % SPREAD | VALID BIDS | CONFIDENCE, on subtotal rows.
  # - Line rows: col-B description within the division block.
  # - Paint hues (falke_rules): red FF0000, cyan 00FFFF, yellow FFFF00 (solid).
  #   "paint: none" asserts NO Falke fill on the value cell (aqua subtotal band
  #   is house formatting, not paint).
  # - Division-level paint/tokens/comments sit on the COST SUBTOTALS cell;
  #   line-level paint on the COST cell; footer paint on the merged COST cell.

# Column order = leveled_total ascending (leveled_total == grand_total for all
# six bids: Fairway's by-owner line carries no amount, so no deduction).
bidder_order:
  - Cypress Coast Plumbing Co.        # 300,000
  - Fairway Building Group Inc.       # 833,000
  - Beacon Shoreline Builders Inc.    # 1,117,000
  - Eastline Mechanical & Restoration Corp   # 1,447,250
  - Delta Gulf Contracting LLC        # 1,560,000
  - Alpha Restoration Group LLC       # 1,582,000

# W-D B4/§2: ONE identical LEGEND block on BOTH data sheets, with the
# precedence line. Comment speaker-tags ([FALKE R{n}] / [ARA {tag}] /
# [QUARANTINE]) are asserted per-cell below — Marvin hand-ratifies the tag
# strings on this first W-D harness run.
legend_present_on: [Bid_Form, Leveled_Normalized]
legend_precedence_contains: "Quarantine ⚠ overrides all; then Red > Cyan > Yellow > Neutral."

leveled_sheet:
  presence:
    banner_row1_contains: "ESTIMATOR-NORMALIZED"
    disclaimer_row3_contains: "DISCLAIMER:"
    # W-D B4/§2: the Falke-only legend is superseded by the ONE workbook
    # legend (identical block on both data sheets — see legend_present_on).
    legend_header_contains: "LEGEND — READING THIS WORKBOOK"
    assumptions_header_contains: "LEVELING RULE DECISIONS & ASSUMPTIONS IN FORCE"
    alternates_header_contains: "Bid Alternates (add/deduct — NOT included in base comparison)"
    summary_header_contains: "LEVELING SUMMARY"

  # ---------------------------------------------------------------------------
  # BENCHMARK BLOCK per division (subtotal rows). R9 median over VALID prices
  # only (state AMOUNT/ALLOWANCE — A6): stated-$0 (Cypress DIV 01), Excluded
  # (Beacon DIV 09), Not Applicable (Fairway DIV 02), Not-Comparable (Fairway
  # DIV 09) and missing cells NEVER enter the median.
  # ---------------------------------------------------------------------------
  benchmarks:
    "DIV 01 00 00":
      # valid: Echo 80,000 / Alpha 100,000 / Beacon 102,000(leveled, 90,000+
      # 12,000 dumpster reclass) / Fairway 110,000 / Delta 120,000
      # sorted -> median = 102,000; spread = (120,000-80,000)/102,000 = 0.392157
      median: 102000.00
      n_valid: 5
      spread: 0.392157
      confidence: Medium          # n>=4 but spread > 0.30 (R29 ladder, Q2)
    "DIV 02 00 00":
      # valid: Alpha 100,000 / Delta 160,000 -> median (2 bids) = 130,000
      # spread = 60,000/130,000 = 0.461538. n=2 -> confidence Low, and paint
      # is GATE-SUPPRESSED (Q5/RISK-2: <3 valid bids -> benchmark shows, no
      # cyan/yellow even though both cells qualify: 100,000 <= 104,000 and
      # 160,000 >= 156,000).
      median: 130000.00
      n_valid: 2
      spread: 0.461538
      confidence: Low
    "DIV 03 00 00":
      # GOLD-DEV-1 CLOSED (W-D M-2): Delta's R20-failed 508,000 leaves the
      # median (R7 — invalid/red-flagged values excluded until corrected).
      # valid members: Fairway 310,000 / Echo 450,000 / Alpha 500,000 /
      # Beacon 520,000 -> median 475,000; spread = (520,000-310,000)/475,000
      # = 0.442105; n=4 but spread > 0.30 -> Medium (R29 ladder).
      median: 475000.00
      n_valid: 4
      spread: 0.442105
      confidence: Medium
    "DIV 07 00 00":
      # valid: Fairway 360,000 / Echo 380,000 / Beacon 400,000 (ITEMIZED
      # 300,000 + 60,000 + 40,000 priced allowance — Q4: allowance counts in
      # subtotal AND median; the GOLD-DEV-10 shape-(b) re-arm sits on the
      # RECLASS bidder) / Alpha 400,000 (LUMP_SUM) / Delta 400,000
      # median 400,000; spread = 40,000/400,000 = 0.10 -> HIGH (n>=4, <=0.30)
      median: 400000.00
      n_valid: 5
      spread: 0.10
      confidence: High
    "DIV 09 00 00":
      # valid: Echo 190,000 / Alpha 200,000 / Delta 250,000 -> median 200,000.
      # Beacon (Excluded) and Fairway (Not-Comparable 145,000) are FENCED OUT
      # (R28 / ENC-2) — that n=3 (not 5) is the fencing proof.
      # spread = 60,000/200,000 = 0.30 -> Medium (n=3 < 4, spread <= 0.50)
      median: 200000.00
      n_valid: 3
      spread: 0.30
      confidence: Medium
    "DIV 22 00 00":
      # valid: Alpha 150,000 / Echo 265,000 (legacy code-15 split derived:
      # 150,000+90,000+25,000) / Cypress 300,000 -> median 265,000
      # spread = 150,000/265,000 = 0.566038 > 0.50 -> LOW via spread branch
      median: 265000.00
      n_valid: 3
      spread: 0.566038
      confidence: Low
    "DIV 11 00 00":
      benchmark_cells: empty      # Beacon's dollars moved out by reclass; no
                                  # valid price anywhere -> blank band, no red
                                  # for anyone (nobody priced it)
    "DIV 23 00 00":
      benchmark_cells: empty      # Echo's empty split secondary; nobody priced

  # ---------------------------------------------------------------------------
  # DIVISION SUBTOTAL CELLS per (division, bidder): kind / value / VAR% / paint.
  # paint: {color, rule} — rule ids per FALKE-LEVELING-RULES-SPEC.md.
  # var is the raw fraction written to the VAR% cell (blank where absent).
  # ---------------------------------------------------------------------------
  divisions:
    "DIV 01 00 00":
      "Cypress Coast Plumbing Co.":
        kind: zero                 # stated $0.00 lump sum, no classification
        value: 0.00                # rendered 0.00, painted red
        paint: {color: red, rule: R6}
        comment_contains_all: ["[FALKE R6]", "Zero value without approved classification — R6"]
      "Fairway Building Group Inc.":  {kind: priced, value: 110000.00, var: 0.078431, paint: none}
      "Beacon Shoreline Builders Inc.":
        kind: priced
        value: 102000.00           # 60,000 + 30,000 + 12,000 reclassed-in dumpster
        var: 0.0                   # exactly the median
        paint: none
      "Eastline Mechanical & Restoration Corp":
        kind: priced
        value: 80000.00
        var: -0.215686             # (80,000-102,000)/102,000
        paint: {color: cyan, rule: R12}   # 80,000 <= 102,000*0.80 = 81,600
        comment_contains_all: ["[FALKE R12]", "more than 20% below the bid benchmark"]
      "Delta Gulf Contracting LLC": {kind: priced, value: 120000.00, var: 0.176471, paint: none}
      "Alpha Restoration Group LLC": {kind: priced, value: 100000.00, var: -0.019608, paint: none}

    "DIV 02 00 00":
      "Cypress Coast Plumbing Co.":
        kind: missing
        paint: {color: red, rule: R5}
        comment_contains_all: ["[FALKE R5]", "No pricing submitted for a division priced by other bidders — R5"]
      "Fairway Building Group Inc.":
        kind: by_owner
        token: "Not Applicable"    # ENC-1: bidder's VERBATIM token, italic, NO paint
        paint: none
        comment_contains_all: ["[FALKE R3/R8]", "Approved classification: Not Applicable (R3/R6/R8)"]
      "Beacon Shoreline Builders Inc.":
        kind: missing
        paint: {color: red, rule: R5}
      "Eastline Mechanical & Restoration Corp":
        kind: missing
        paint: {color: red, rule: R5}
      "Delta Gulf Contracting LLC":
        kind: priced
        value: 160000.00
        var: 0.230769
        paint: none                # yellow candidate SUPPRESSED (n=2 < 3, Q5)
      "Alpha Restoration Group LLC":
        kind: priced
        value: 100000.00
        var: -0.230769
        paint: none                # cyan candidate SUPPRESSED (n=2 < 3, Q5)

    "DIV 03 00 00":
      "Cypress Coast Plumbing Co.":
        kind: missing
        paint: {color: red, rule: R5}
      "Fairway Building Group Inc.":
        kind: priced
        value: 310000.00           # engine-DERIVED: 250,000 + 60,000, no stated subtotal
        var: -0.347368             # (310,000-475,000)/475,000 (M-2 median)
        paint: {color: cyan, rule: R12}   # cyan holds: 310,000 <= 475,000*0.80 = 380,000
        # REM-2 disclosure APPENDED to the cyan comment (variance pass runs
        # first, REM-2 appends). Stated CCS 780,000 == sum of displayed priced
        # divisions (110,000+310,000+360,000) -> plain REM-2 text, NO
        # composition-delta sentence, NO dangling "see AUDIT".
        comment_contains_all:
          - "[FALKE R12]"
          - "more than 20% below the bid benchmark"
          - "[ARA REM-2]"
          - "Subtotal DERIVED from priced line items"
      "Beacon Shoreline Builders Inc.": {kind: priced, value: 520000.00, var: 0.094737, paint: none}
      "Eastline Mechanical & Restoration Corp": {kind: priced, value: 450000.00, var: -0.052632, paint: none}
      "Delta Gulf Contracting LLC":
        kind: priced
        value: 508000.00           # stated subtotal (displayed); lines sum 500,000
        var: 0.069474              # (508,000-475,000)/475,000 — VAR% still
                                   # written vs the fenced median (cell stays
                                   # R20 red; red never downgraded, R16)
        paint: {color: red, rule: R20}
        # delta 8,000 > max($5, 0.5% x 508,000 = 2,540) -> R20 red
        comment_contains_all: ["[FALKE R20]", "R20"]
      "Alpha Restoration Group LLC": {kind: priced, value: 500000.00, var: 0.052632, paint: none}

    "DIV 07 00 00":
      "Cypress Coast Plumbing Co.":
        kind: missing
        paint: {color: red, rule: R5}
      "Fairway Building Group Inc.": {kind: priced, value: 360000.00, var: -0.10, paint: none}
      "Beacon Shoreline Builders Inc.":
        kind: priced
        value: 400000.00           # RE-ARMED (GOLD-DEV-10 fix PR, Marvin ruling (4)):
        var: 0.0                   # Beacon (the RECLASS bidder) carries the ITEMIZED
        paint: none                # allowance division (300,000 + 60,000 + 40,000-ALLOW,
                                   # stated 400,000). The fixed engine passes untouched
                                   # divisions through byte-identical — a regression to
                                   # whole-bid re-derivation would show 360,000 + a false
                                   # R20 red here, and this cell catches it.
      "Eastline Mechanical & Restoration Corp": {kind: priced, value: 380000.00, var: -0.05, paint: none}
      "Delta Gulf Contracting LLC":
        kind: priced
        value: 400000.00           # lines sum 398,500; delta 1,500 <= max($5, 0.5% x
        var: 0.0                   # 400,000 = 2,000) -> NO R20 paint (within Falke
        paint: none                # tolerance). AUDIT still fires at $1 — GOLD-DEV-2.
      "Alpha Restoration Group LLC":
        kind: priced
        value: 400000.00           # LUMP_SUM (took Beacon's old shape in the re-arm swap)
        var: 0.0
        paint: none

    "DIV 09 00 00":
      "Cypress Coast Plumbing Co.":
        kind: missing
        paint: {color: red, rule: R5}
      "Fairway Building Group Inc.":
        kind: not_comparable       # division composed entirely of NC lines (ENC-2)
        value: 145000.00           # displayed as submitted, NEVER benchmarked
        paint: none
        comment_contains_all: ["[ARA NC/R7]", "Not Comparable — excluded from benchmark (R7/R8)"]
      "Beacon Shoreline Builders Inc.":
        kind: excluded             # input: stated $0.00 subtotal over Excluded lines
        token: "Excluded"          # -> R28 language, NOT generic R6 zero
        paint: {color: red, rule: R28}
        comment_contains_all: ["[FALKE R28]", "Exclusion without user approval — R28"]
        # GOLD-DEV-10 FIXED: the leveled view passes this untouched division
        # through byte-identical, so REM-1 EXPLICIT_ZERO survives on BOTH
        # views and div_status classifies via the stated-$0 line consult
        # (all lines Excluded -> red "Excluded" + R28) on both.
      "Eastline Mechanical & Restoration Corp": {kind: priced, value: 190000.00, var: -0.05, paint: none}
      "Delta Gulf Contracting LLC":
        kind: priced
        value: 250000.00
        var: 0.25
        paint: {color: yellow, rule: R13}   # 250,000 >= 200,000*1.20 = 240,000
        comment_contains_all: ["[FALKE R13]", "more than 20% above the bid benchmark"]
      "Alpha Restoration Group LLC": {kind: priced, value: 200000.00, var: 0.0, paint: none}

    "DIV 11 00 00":
      # Beacon's mirror shows 12,000 here; the LEVELED view is vacated by the
      # GOLD_BEACON_DUMPSTER reclass and NOBODY else priced it -> blank band,
      # no paint for any bidder (phantom-gap safe because no peer priced it —
      # see GOLD-DEV-8 for the armed writer-side landmine we deliberately do
      # NOT trigger in v1).
      all_bidders: {kind: missing_or_blank, paint: none}

    "DIV 22 00 00":
      "Cypress Coast Plumbing Co.":
        kind: priced
        value: 300000.00
        var: 0.132075
        paint: none                # 300,000 < 318,000 (1.2x) -> neutral
      "Fairway Building Group Inc.":
        kind: missing
        paint: {color: red, rule: R5}
      "Beacon Shoreline Builders Inc.":
        kind: missing
        paint: {color: red, rule: R5}
      "Eastline Mechanical & Restoration Corp":
        kind: priced
        value: 265000.00           # split-derived: 150,000 + 90,000 + 25,000 (held unmatched line)
        var: 0.0
        paint: none
      "Delta Gulf Contracting LLC":
        kind: missing
        paint: {color: red, rule: R5}
      "Alpha Restoration Group LLC":
        kind: priced
        value: 150000.00
        var: -0.433962             # (150,000-265,000)/265,000
        paint: {color: cyan, rule: R12}   # 150,000 <= 212,000 (0.8x)
        comment_contains_all: ["[FALKE R12]", "more than 20% below the bid benchmark"]

    "DIV 23 00 00":
      all_bidders: {kind: missing_or_blank, paint: none}   # Echo's empty split secondary

  # ---------------------------------------------------------------------------
  # LINE ROWS (COST column). No unified line is priced by >=2 bidders in this
  # set (descriptions deliberately <60% word overlap), so there are NO
  # line-level benchmarks/variance — line-level paint fires only via R6.
  # ---------------------------------------------------------------------------
  line_rows:
    "DIV 01 00 00":               # from Beacon's leveled items (others lump-sum)
      - {desc: "Project management & site supervision", bidder: "Beacon Shoreline Builders Inc.", value: 60000.00, paint: none}
      - {desc: "Temporary facilities & protection", bidder: "Beacon Shoreline Builders Inc.", value: 30000.00, paint: none}
      - {desc: "Dumpster rental & waste hauling", bidder: "Beacon Shoreline Builders Inc.", value: 12000.00, paint: none}  # reclassed IN (leveled only)
    "DIV 02 00 00":
      # ENC-5 LANDED (W-D): line-level by-owner/excluded cells render the
      # bidder's classification token, italic, NO paint, on the decision view.
      - {desc: "Site demolition & clearing", bidder: "Fairway Building Group Inc.",
         token: "Not Applicable", italic: true}
    "DIV 03 00 00":
      - {desc: "Balcony slab edge spall repair", bidder: "Alpha Restoration Group LLC", value: 300000.00}
      - {desc: "Post-tension tendon repair & restressing", bidder: "Alpha Restoration Group LLC", value: 150000.00}
      - {desc: "Structural column & beam restoration", bidder: "Alpha Restoration Group LLC", value: 50000.00}
      - {desc: "Garage slab concrete repairs", bidder: "Delta Gulf Contracting LLC", value: 200000.00}
      - {desc: "Shear wall crack injection & structural repair", bidder: "Delta Gulf Contracting LLC", value: 180000.00}
      - {desc: "Stair tower concrete restoration", bidder: "Delta Gulf Contracting LLC", value: 120000.00}
      - {desc: "Garage level spall & delamination repair", bidder: "Fairway Building Group Inc.", value: 250000.00}
      - {desc: "Building expansion joint replacement", bidder: "Fairway Building Group Inc.", value: 60000.00}
    "DIV 07 00 00":
      # Re-armed shape (b): the allowance division now sits on Beacon, the
      # RECLASS bidder (GOLD-DEV-10 fix PR, Marvin ruling (4)).
      - {desc: "Balcony & walkway deck waterproofing systems", bidder: "Beacon Shoreline Builders Inc.", value: 300000.00}
      - {desc: "Exterior joint sealants & deck coating replacement", bidder: "Beacon Shoreline Builders Inc.", value: 60000.00}
      - desc: "Sealant & coating material allowance"
        bidder: "Beacon Shoreline Builders Inc."
        value: 40000.00
        paint: none
        note: >-
          Allowance renders as a plain number on the leveled sheet (RISK-3 —
          no on-matrix marker; the ALLOWANCE_PRESENT flag lives on AUDIT).
      - {desc: "Main roof membrane replacement", bidder: "Delta Gulf Contracting LLC", value: 250000.00}
      - {desc: "Perimeter sheet metal & flashing", bidder: "Delta Gulf Contracting LLC", value: 148500.00}
    "DIV 09 00 00":
      # ENC-5 LANDED: Beacon's excluded lines render the italic token; the
      # per-line severity lives on AUDIT (division-level EXPLICIT_EXCLUSION
      # here, since the whole division is excluded — ENC-6 dedup).
      - {desc: "Interior corridor painting", bidder: "Beacon Shoreline Builders Inc.",
         token: "Excluded", italic: true}
      - {desc: "Lobby flooring & base", bidder: "Beacon Shoreline Builders Inc.",
         token: "Excluded", italic: true}
      - desc: "Unit interior refresh package (owner option)"
        bidder: "Fairway Building Group Inc."
        value: 145000.00
        paint: none
        comment_contains_all: ["[ARA NC/R7]", "Not Comparable — excluded from benchmark (R7/R8)"]
    "DIV 22 00 00":
      - {desc: "Riser piping replacement — all stacks, floors 1 through 12", bidder: "Cypress Coast Plumbing Co.", value: 260000.00}
      - {desc: "Unit angle stop & shutoff valve replacement", bidder: "Cypress Coast Plumbing Co.", value: 40000.00}
      - desc: "Permit & inspection fees"
        bidder: "Cypress Coast Plumbing Co."
        value: 0.00
        paint: {color: red, rule: R6}     # line-level explicit zero, unclassified
        comment_contains_all: ["[FALKE R6]", "Zero value without approved classification — R6"]
      - {desc: "Domestic water distribution renewal, phases 1-3", bidder: "Eastline Mechanical & Restoration Corp", value: 150000.00}
      - {desc: "Sanitary waste stack repairs, common areas", bidder: "Eastline Mechanical & Restoration Corp", value: 90000.00}
      - {desc: "General building systems contingency", bidder: "Eastline Mechanical & Restoration Corp", value: 25000.00}  # unmatched split line, HELD here (RED on AUDIT, not on-sheet)

  # ---------------------------------------------------------------------------
  # FOOTER (leveled display values = additive composition; the mirror renders
  # the SAME numbers — both consume grand_total_component_amounts()).
  # Order: [CCS, GL, BR, GC_FEE, OHP, OTHER_FEES, BOND, FEES_SUBTOTAL, GRAND_TOTAL]
  # ---------------------------------------------------------------------------
  footer:
    "Cypress Coast Plumbing Co.":       [300000.00, 0, 0, 0, 0, 0, 0, 0.00, 300000.00]
    "Fairway Building Group Inc.":      [780000.00, 10000.00, 5000.00, 30000.00, 0, 0, 8000.00, 53000.00, 833000.00]
      # Fairway's stated other_fees 45,000 == GL+BR+GC exactly -> MEMO, rendered
      # 0 (never double-counted); GT = 780,000+10,000+5,000+30,000+8,000 = 833,000
    "Beacon Shoreline Builders Inc.":   [1022000.00, 0, 0, 60000.00, 0, 35000.00, 0, 95000.00, 1117000.00]
      # GL/BR absent AND other_fees unexplained by stated fee rows -> ADDITIVE
      # (insurance-folded pattern); GT = 1,022,000+60,000+35,000 = 1,117,000
    "Eastline Mechanical & Restoration Corp": [1365000.00, 14000.00, 0, 68250.00, 0, 0, 0, 82250.00, 1447250.00]
      # legacy 17-020 -> GL, 17-040 -> GC fee, carried in footer fields
    "Delta Gulf Contracting LLC":       [1438000.00, 12000.00, 0, 70000.00, 40000.00, 0, 0, 122000.00, 1560000.00]
    "Alpha Restoration Group LLC":      [1450000.00, 15000.00, 10000.00, 87000.00, 0, 0, 20000.00, 132000.00, 1582000.00]
      # bond INSIDE the grand total (the common bonded-bid presentation)
  grand_total_paint: none_for_all_bidders   # every stated GT == component sum (R21 clean)

  # ---------------------------------------------------------------------------
  # ALTERNATES section (never in base comparison)
  # ---------------------------------------------------------------------------
  alternates:
    - {bidder: "Fairway Building Group Inc.", desc_contains: "DEDUCT ALTERNATE 1", value: -25000.00}
    - {bidder: "Alpha Restoration Group LLC", desc_contains: "ADD ALTERNATE 1", value: 95000.00}

  # ---------------------------------------------------------------------------
  # R32 SUMMARY BLOCK (per bidder, COST SUBTOTALS column).
  # Red/Cyan/Yellow = PaintTracker.by_bidder (painted cells on this sheet).
  # Avg Variance = mean of that bidder's written VAR% fractions (DIV 03 VARs
  # recomputed vs the M-2 fenced median 475,000 — W-D gold flip):
  #   Cypress: (+0.132075)/1                                        = 0.132075
  #   Fairway: (0.078431 - 0.347368 - 0.10)/3                       = -0.122979
  #   Beacon:  (0 + 0.094737 + 0)/3                                 = 0.031579
  #   Echo:    (-0.215686 - 0.052632 - 0.05 - 0.05 + 0)/5           = -0.073664
  #   Delta:   (0.176471 + 0.230769 + 0.069474 + 0 + 0.25)/5        = 0.145343
  #   Alpha:   (-0.019608 - 0.230769 + 0.052632 + 0 + 0 - 0.433962)/6 = -0.105285
  # ---------------------------------------------------------------------------
  summary_block:
    "Cypress Coast Plumbing Co.":
      total_bid: 300000.00
      adjusted_total: 300000.00
      red: 6        # DIV 01 R6 + DIV 02/03/07/09 R5 + DIV 22 line R6
      cyan: 0
      yellow: 0
      avg_variance: 0.132075
    "Fairway Building Group Inc.":
      total_bid: 833000.00
      adjusted_total: 833000.00
      red: 1        # DIV 22 R5
      cyan: 1       # DIV 03
