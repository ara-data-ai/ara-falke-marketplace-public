# through program coordination to the design queue. Fixing one flips its
# expectation in the same PR.
# =============================================================================
known_deviations:
  - id: GOLD-DEV-1
    finding: >-
      R7 partially implemented: a division subtotal that FAILS R20 (Delta
      DIV 03, stated 508,000 vs lines 500,000, painted red) still enters the
      benchmark median as a valid price. Rules-spec R7: "Invalid/red-flagged
      values are EXCLUDED from benchmark calculations until corrected or
      user-approved."
    resolution: >-
      RESOLVED 2026-07-15 (W-D M-2): ONE median-membership rule
      (falke_rules.median_membership — div_status kind=="priced" AND
      amount > 0 AND not R20-failed) now feeds the leveled benchmark block,
      the variance pass, audit._compute_division_medians, and the scope-gap
      value strings. Delta's R20-failed 508,000 leaves the DIV 03 median
      (475,000 / n 4 / spread 0.442105 / Medium); its red cell and written
      VAR% (+0.069474) remain. Pre-rules the W-G single-stats-brain build.
    encoded_in: [benchmarks.DIV 03 00 00]
  - id: GOLD-DEV-2
    finding: >-
      A4 partially implemented: audit.py ARITHMETIC_DISCREPANCY still fires at
      the legacy $1 tolerance while the leveled sheet uses Falke's
      max($5, 0.5%). Delta DIV 07 ($1,500 on 400,000): sheet clean, AUDIT RED.
      One instrument, two tolerances for the same check.
    encoded_in: [audit rows Delta DIV 07]
  - id: GOLD-DEV-3
    finding: >-
      Exclusion-register hole: a stated-$0-over-Excluded division (Beacon
      DIV 09) yields NO exclusion AuditItem — EXPLICIT_EXCLUSION keys on a
      subtotal CellState (EXCLUDED) that normalize never produces, and
      line-level EXCLUDED cells emit no audit row at all. The board-facing
      sheet carries R28 red correctly; the register does not. ENC-6 candidate.
    resolution: >-
      RESOLVED 2026-07-15 (W-D ENC-6): exclusion/by-owner classifications are
      now first-class register rows keyed on div_status (the dead
      subtotal-state==EXCLUDED branch replaced). Fully-excluded division ->
      ONE division-level EXPLICIT_EXCLUSION RED row (value "Excluded",
      estimated cost impact = the M-2 field median; dedup: no per-line rows);
      EXCLUDED line inside an otherwise-priced division -> one RED row per
      line; fully by-owner division -> ONE division-level BY_OWNER_DEDUCTED
      YELLOW row carrying the verbatim token (replaces the per-line rows;
      per-line BY_OWNER remains only inside priced divisions).
    encoded_in: [audit rows Beacon DIV 09 EXPLICIT_EXCLUSION]
  - id: GOLD-DEV-4
    finding: >-
      audit._compute_division_medians does not fence Not-Comparable-composed
      subtotals (state AMOUNT): DIV 09 audit median is 195,000 (includes
      Fairway's 145,000 NC) while the sheet benchmark is 200,000 (fenced).
      Gap-value strings on AUDIT cite the unfenced median.
    resolution: >-
      RESOLVED 2026-07-15 (W-D M-2): audit-side medians consume the ONE
      membership rule (div_status-classified), so the NC-composed subtotal is
      fenced on the register exactly as on the sheet — Cypress DIV 09 gap
      string now cites $200,000, the number the board sees. Two medians on
      one instrument was the trust-eroder; there is now one.
    encoded_in: [audit rows Cypress DIV 09]
  - id: GOLD-DEV-5
    finding: >-
      audit check-1 computed_sum omits NOT_COMPARABLE line amounts while
      normalize._resolve_subtotal_cell and falke_rules.r20_math_fail include
      them -> FALSE RED ARITHMETIC_DISCREPANCY ($145,000) on Fairway DIV 09;
      the sheet is correctly unpainted. Sheet-clean/audit-red contradiction.
    encoded_in: [audit rows Fairway DIV 09]
  - id: GOLD-DEV-6
    finding: >-
      A BIDDER's own footer error (stated GT != stated component sum) trips
      Stage 6b check 2 and quarantines the delivery with language that says
      "this is a tool/formatting problem, not a finding about any contractor's
      bid" — the wrong story for a bidder error. Demonstrated in the
      quarantine variant (bond-on-top).
    ruling: >-
      MARVIN RULING 2026-07-15 (adjudicates harness D2 + this item as one
      design). (1) Stage 6b check 2 gains a BIDDER-ERROR BRANCH: after
      computing arith_delta, also compute bidder_footer_delta =
      abs(grand_total_component_sum(bid.footer) - stated grand_total) from the
      NORMALIZED bid (writer-independent — normalized_models is already
      reconcile's single source of truth). If |arith_delta -
      bidder_footer_delta| <= TIEOUT_TOLERANCE, the written sheet FAITHFULLY
      reproduces the bidder's own footer inconsistency: emit NO
      POST_WRITE_TIEOUT_FAILURE — the pre-write FOOTER_DISCREPANCY RED row and
      the R21 red on the GT cell already tell the story in the RIGHT
      vocabulary (bidder error). Otherwise fire exactly as today (true
      tool-side failure). No coverage lost: a write error changes the delta;
      checks 1 and 3 still guard the GT and division cells independently.
      Rationale: bond-on-top is a RECURRING legitimate bid presentation —
      quarantining the whole delivery (exit 3) for it every run is crying
      wolf, and wolf-crying is what teaches a board to ignore a real
      quarantine. (2) The banner's tool-attribution language then becomes TRUE
      again — no wording change needed. (3) INDEPENDENTLY, _mark_cell
      (write_matrix.py:1790-1801) must COMPOSE, never overwrite: quarantine
      fill wins visually (established precedence: Quarantine > Falke Red), but
      the comment must PREPEND the [QUARANTINE] text above any existing
      comment ("\n\n--- prior flag on this cell ---\n" + old text) so a true
      tool defect on an already-painted cell never erases the bid-level story.
      (4) Same-PR gold-set flips: quarantine variant becomes a CLEAN exit-0
      run (R21 red + "R21" comment survive on Quayside's GT; FOOTER_DISCREPANCY
      RED row; no banner, no tie-out rows); the quarantine-chain proof moves
      to a FAULT-INJECTION step in the harness (corrupt one GT cell in a copy
      of the main-run workbook, call reconcile_written_matrix +
      apply_quarantine directly, assert banner/composed-mark/AUDIT
      rows/QUARANTINE line) — the only honest way to produce a true tool
      defect. Until that PR, expectations-quarantine.yaml encodes CURRENT
      behavior (quarantine mark overwrites R21) tagged defect D2.
    resolution: >-
      RESOLVED 2026-07-15 (wave-two engine patch 3, all four ruling parts):
      (1) reconcile check 2 gained the bidder-error branch — bidder_footer_delta
      computed via the RENDERED composition (grand_total_component_sum, memo
      other_fees suppressed — Floyd W2-1), suppression per-bidder/per-sheet/
      check-2-only (W2-2), delta-matched within TIEOUT_TOLERANCE; (2)+(3)
      _mark_cell now COMPOSES (quarantine fill wins visually, comment prepends
      above the prior story); (4) expectations-quarantine.yaml rewritten as a
      clean exit-0 run with quarantine-chain ABSENCE assertions, and the chain
      proof (banner / composed mark incl. prior-R20 survival / RED rows /
      QUARANTINE line) moved to the harness fault-injection step in the SAME
      change (Floyd W2-5); the exit-3 pipeline mapping stays covered by
      tests/test_reconcile.py. The D2 count-vs-visible R32 incoherence is gone
      with the same fix (the R21 paint the summary counts now survives).
    encoded_in: [expectations-quarantine.yaml]
  - id: GOLD-DEV-7
    finding: >-
      Audit-noise family. (i) Present-but-blank divisions raise
      SCOPE_GAP_IMPLICIT with no median guard (Echo DIV 23: "Field median:
      $0") and even when the division is by-owner classified (Fairway
      DIV 02). (ii) Harness D1, same family: the zero-item split SECONDARY
      division is created LUMP_SUM and draws a LUMP_SUM_DIVISION row with no
      dollars behind it (Echo DIV 23). Over-flagging — safe direction, but
      noisy and story-blurring.
    ruling: >-
      MARVIN RULING 2026-07-15 (adjudicates harness D1 + scopes the noise
      fix). D1: the engine is WRONG — a division the bidder never submitted,
      carrying zero dollars, is not "priced as a single total"; the row is
      encoded-as-current (defect-tagged, totals 60/39) and the fix suppresses
      it. Noise-fix spec, one bundle: (1) LUMP_SUM_DIVISION fires only when
      the division carries a subtotal amount OR line items — zero-item,
      no-subtotal shells (split secondaries, reclass-vacated divisions) emit
      nothing; (2) the present-but-blank SCOPE_GAP_IMPLICIT branch gains the
      SAME median guard as the absent branch (median > 0); (3) a
      present-but-blank division whose line states are ALL classified
      (BY_OWNER_OTHERS / EXCLUDED / NOT_COMPARABLE) raises NO scope-gap row —
      the classification rows (BY_OWNER_DEDUCTED, future exclusion rows) carry
      the story. ORDERING CONSTRAINT: rule (3) must land WITH OR AFTER the
      GOLD-DEV-3/ENC-6 exclusion-instrumentation rows — otherwise an excluded
      division loses its only (mislabeled) register trace (today Beacon
      DIV 09's SCOPE_GAP row is the sole register echo of its exclusion).
      Expectation flips in the fixing PR: delete Echo DIV 23 LUMP_SUM row,
      delete Echo DIV 23 + Fairway DIV 02 SCOPE_GAP rows (Beacon DIV 09's row
      flips separately under GOLD-DEV-10).
    resolution: >-
      FULLY RESOLVED 2026-07-15. Rules (1)+(2): wave-two engine patch 2 —
      LUMP_SUM_DIVISION requires a subtotal amount OR line items, and the
      present-but-blank SCOPE_GAP branch carries the median guard (now the
      M-1 $20,000 materiality threshold, W-D). Rule (3): landed in the W-D
      ENC-6 change (the ordering constraint — one change): a present-but-
      blank division whose line states are ALL classified raises NO
      scope-gap row; the Fairway DIV 02 SCOPE_GAP row is deleted and the
      division-level BY_OWNER_DEDUCTED row carries the story.
    encoded_in: [audit rows Fairway DIV 02 division-level BY_OWNER_DEDUCTED]
  - id: GOLD-DEV-8
    finding: >-
      NOT ENCODED (deliberately not triggered): writer-side phantom gap — if a
      peer bidder priced a reclass FROM-division, the vacated bidder's leveled
      cell would paint R5 red ("no pricing submitted") with no vacated-
      by-reclass suppression in the writer (audit suppresses; writer does
      not). Armed landmine; v1 keeps DIV 11 unique to Beacon so the set stays
      truthful. Fix before any known-firm reclass where peers price the FROM
      division.
    resolution: >-
      RESOLVED 2026-07-15 (wave-two engine patch 1, bundled with GOLD-DEV-10
      per Marvin ruling (3)): write_matrix's leveled R5 branch now consumes
      the vacated-by-reclass set carried on the normalized view (the same
      per-bidder set audit.py uses — Floyd W2-4) and renders a vacated
      division blank with the "Reclassified — … carried in {TO} on this
      view" comment, never R5 red. Peer-prices-the-FROM-division is covered
      by a writer unit test (tests/test_option_c.py) rather than re-shaping
      gold-v1; DIV 11 stays unique to Beacon here.
  - id: GOLD-DEV-9
    finding: >-
      NOT ENCODED (statistical note): the 2-sigma GC_FEE_OUTLIER can NEVER
      fire for a single outlier at n<=5 bids (max |dev|/sample-sigma =
      (n-1)/sqrt(n) < 2). Near-dead code for typical 3-6 bid condo fields;
      consider an absolute-percentage-point band instead.
  - id: GOLD-DEV-10
    finding: >-
      HIGH PRIORITY — leveled-view subtotal corruption for reclass-matched
      bidders: build_normalized_view -> _apply_reclass_moves re-derives
      division_subtotal for EVERY division of the matched bidder, not just the
      touched from/to pair. Consequences: (a) an ITEMIZED stated subtotal is
      silently replaced by the line sum, so a bidder's R20 math error would
      VANISH from the leveled view; (b) _derive_subtotal EXCLUDES allowance
      amounts (unlike _resolve_subtotal_cell, which includes them), so an
      allowance-bearing ITEMIZED division would display understated with a
      FALSE R20 red (e.g. stated 400,000 with a 40,000 allowance -> 360,000);
      (c) a stated-$0 subtotal (REM-1 EXPLICIT_ZERO) becomes NULL_BLANK,
      shifting the audit story from verified-$0 to scope-gap (encoded: Beacon
      DIV 09 SCOPE_GAP row). Dormant on the private real-project validation
      set only because the reclass firm
      carried none of these shapes. GOLD-SET v1 deliberately keeps the reclass
      bidder free of shapes (a) and (b); when fixed, re-arm the set by moving
      an allowance/math-error division onto the reclass bidder. Fix candidate:
      re-derive ONLY the touched from/to divisions, include allowances, and
      preserve stated subtotals elsewhere.
    ruling: >-
      MARVIN 2026-07-15 — Christine's wave-two fix shape is BLESSED with four
      amendments. (1) Touched set = union of from_division and to_division
      across THIS bidder's FIRED recommendations; every other division passes
      through byte-identical (original DivisionBid, stated subtotal, cost
      structure, REM-1 $0s intact). (2) Touched-division re-derivation must
      use the SAME state->amount inclusion table as _resolve_subtotal_cell
      (AMOUNT + EXPLICIT_ZERO + ALLOWANCE + NOT_COMPARABLE in; BY_OWNER /
      EXCLUDED / blank out) — not merely "include allowances"; contract-test
      the two sites against one shared table (W-G seam). (3) GOLD-DEV-8
      bundles in, same seam: the writer gains the SAME per-bidder
      vacated-by-reclass suppression audit already has — a division this
      bidder's reclass fully vacated renders NO R5 red and NO value, with the
      comment "Reclassified — this bidder's {FROM} scope is carried in {TO}
      on this view (KNOWN_FIRM_RECLASSIFIED; see Bid_Form Normalization Note
      and AUDIT)" so a peer-priced FROM division never tells the board a
      false missing-scope story. (4) Same-PR gold flips: Beacon DIV 09 audit
      row SCOPE_GAP_IMPLICIT($195,000) -> ARITHMETIC_VERIFIED GREEN "$0"
      (REM-1 restored on the leveled view; remove the GOLD-DEV-10c branch
      nuance note on the DIV 09 cell); RE-ARM shape (b) by reverting the
      Alpha/Beacon DIV 07 swap (Beacon takes back the ITEMIZED
      300,000+60,000+40,000-ALLOW division, Alpha returns to LUMP_SUM
      400,000) and assert Beacon leveled DIV 07 == 400,000 with NO paint;
      shape (a) (stated-subtotal preservation) is covered by a unit/contract
      test rather than growing the golden set. Audit-row recount lands in the
      same PR.
    resolution: >-
      RESOLVED 2026-07-15 (wave-two engine patch 1): _apply_reclass_moves now
      rebuilds ONLY the touched from/to divisions (byte-identical pass-through
      elsewhere), touched re-derivation uses the shared SUBTOTAL_SUM_STATES
      table (same table as _resolve_subtotal_cell; contract-tested across
      both sites plus reconcile's independent _AMOUNT_BEARING_STATES as a
      value-equivalent fourth site — Floyd W2-3), and all four Marvin
      amendments landed: (1) touched-set semantics, (2) shared inclusion
      table, (3) GOLD-DEV-8 writer suppression, (4) gold flips (Beacon DIV 09
      -> ARITHMETIC_VERIFIED "$0"; DIV 07 allowance re-arm on the reclass
      bidder; shape (a) unit-tested in tests/test_normalize.py).
    encoded_in: [audit rows Beacon DIV 09]

